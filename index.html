<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しーずんの道具箱 | Season_Log</title>
    <style>
        /* --- 基本設定（リセット・共通） --- */
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            color: #333;
            line-height: 1.6;
            background-color: #fcfcfc;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- TOP（ヒーロー）セクション --- */
        .hero-section {
            padding: 80px 0;
            background-color: #ffffff;
            border-bottom: 1px solid #eee;
        }

        .hero-flex {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .hero-content {
            flex: 1.2;
        }

        .hero-image {
            flex: 0.8;
            text-align: center;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            /* 画像が浮いているように見せたい場合は下の影を有効にしてください */
            /* filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); */
        }

        /* --- テキスト装飾 --- */
        .site-formal-name {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 8px;
            font-weight: bold;
            display: block;
            letter-spacing: 0.05em;
        }

        .hero-title {
            font-size: 2.8rem;
            margin: 0 0 20px 0;
            color: #222;
            line-height: 1.2;
        }

        .hero-description {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 40px;
            word-break: break-all;
        }

        /* --- オレンジのボタン --- */
        .btn-orange {
            display: inline-block;
            background-color: #f39800;
            color: #ffffff;
            padding: 18px 40px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 0 #c77c00; /* 立体感 */
        }

        .btn-orange:hover {
            background-color: #e58700;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #c77c00;
        }

        /* --- ツールセクション（ここから下にコンテンツを足せます） --- */
        .section-tools {
            padding: 80px 0;
        }

        .section-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 40px;
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background-color: #f39800;
        }

        /* --- レスポンシブ対応（スマホ表示） --- */
        @media (max-width: 768px) {
            .hero-flex {
                flex-direction: column;
                text-align: center;
                gap: 30px;
            }

            .hero-image {
                order: 2; /* 画像を文字の下にする */
            }

            .hero-content {
                order: 1; /* 文字を一番上にする */
            }

            .hero-title {
                font-size: 2rem;
            }

            .hero-description {
                text-align: left; /* スマホでも読みやすさ優先で左寄せ */
                font-size: 1rem;
            }

            .btn-orange {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="container hero-flex">
            
            <div class="hero-content">
                <span class="site-formal-name">Season_Log</span>
                <h1 class="hero-title">しーずんの道具箱</h1>
                <p class="hero-description">
                    しーずんが作った実用品ツールや活動記録をまとめた拠点です。<br>
                    公開中のツール、販売ページ、note記事への導線をわかりやすく整理しています。
                </p>
                <div class="hero-cta">
                    <a href="#tools" class="btn-orange">公開中ツールを見る</a>
                </div>
            </div>

            <div class="hero-image">
                <img src="season002.png" alt="しーずんのイラスト">
            </div>

        </div>
    </section>

    <section id="tools" class="section-tools">
        <div class="container">
            <h2 class="section-title">公開中のツール</h2>
            <p style="text-align: center; color: #999;">（ここにツール一覧を準備していきましょうね）</p>
        </div>
    </section>

</body>
</html>
